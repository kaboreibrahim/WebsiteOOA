<a href="{% url url %}" class="bg-white dark:bg-[#1a2219] rounded-2xl p-5 border border-gray-100 dark:border-[#2d3d30] shadow-sm hover:shadow-md transition-shadow">
  <div class="flex items-start justify-between mb-3">
    <div class="w-10 h-10 rounded-xl bg-{{ color }}-100 dark:bg-{{ color }}-900/30 flex items-center justify-center">
      <span class="material-symbols-outlined text-{{ color }}-600 dark:text-{{ color }}-400 filled">{{ icon }}</span>
    </div>
    <span class="text-xs font-medium text-{{ color }}-600 dark:text-{{ color }}-400 bg-{{ color }}-50 dark:bg-{{ color }}-900/20 px-2 py-0.5 rounded-full">{{ badge_val }} {{ badge_label }}</span>
  </div>
  <p class="text-2xl font-bold text-gray-900 dark:text-white">{{ total }}</p>
  <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">{{ label }}</p>
</a>
